<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Financiera Pro | Corporativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main class="main-content">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_advanced_chart" style="height:calc(100% - 32px);width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "FOREXCOM:SPX500",
                    "interval": "D",
                    "timezone": "America/Lima",
                    "theme": "dark",
                    "style": "1",
                    "locale": "es",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_advanced_chart"
                });
                </script>
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="highlight-box">
                <div class="widget-title">DÓLAR PERÚ (USD/PEN)</div>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                    {"symbol": "FX_IDC:USDPEN", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "es"}
                    </script>
                </div>
            </div>

            <div class="widget-title">MERCADOS Y DIVISAS</div>
            <div class="watchlist-container">
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                    {
                        "width": "100%", "height": "100%",
                        "symbolsGroups": [
                            {
                                "name": "Monitor",
                                "symbols": [
                                    { "name": "FOREXCOM:SPX500", "displayName": "S&P 500" },
                                    { "name": "NASDAQ:IXIC", "displayName": "NASDAQ 100" },
                                    { "name": "TVC:DJI", "displayName": "DOW JONES" },
                                    { "name": "FX_IDC:EURPEN", "displayName": "EURO / SOL" },
                                    { "name": "FX_IDC:JPYPEN", "displayName": "YEN / SOL" },
                                    { "name": "TVC:GOLD", "displayName": "ORO" },
                                    { "name": "CAPITALCOM:COPPER", "displayName": "COBRE" },
                                    { "name": "TVC:SILVER", "displayName": "PLATA" },
                                    { "name": "TVC:USOIL", "displayName": "PETRÓLEO WTI" },
                                    { "name": "TVC:UKOIL", "displayName": "BRENT CRUDE" },
                                    { "name": "NASDAQ:META", "displayName": "META INC" },
                                    { "name": "NASDAQ:AAPL", "displayName": "APPLE" },
                                    { "name": "NASDAQ:NVDA", "displayName": "NVIDIA" },
                                    { "name": "NASDAQ:GOOGL", "displayName": "GOOGLE" },
                                    { "name": "NASDAQ:TSLA", "displayName": "TESLA" },
                                    { "name": "BINANCE:BTCUSDT", "displayName": "BITCOIN" },
                                    { "name": "BINANCE:ETHUSDT", "displayName": "ETHEREUM" },
                                    { "name": "BINANCE:SOLUSDT", "displayName": "SOLANA" }
                                ]
                            }
                        ],
                        "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "locale": "es"
                    }
                    </script>
                </div>
            </div>
        </aside>

        <footer class="news-ticker">
            <div class="source-tag">NOTICIAS EN VIVO</div>
            <div class="marquee-container">
                <div id="noticias-dinamicas" class="marquee-text">Cargando flujo financiero de hoy...</div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
